                  line = line.strip()
                  if line:
                      allowed_files.add(line)

          if not allowed_files:
              fail("Failure type: no_allowed_files\nAllowed files list is empty.")

          needs_files = data.get("needs_files")

          if isinstance(needs_files, list) and needs_files:
              requested = []

              for path in needs_files:
                  if not isinstance(path, str):
                      continue

                  path = path.strip()

                  if not path:
                      continue

                  if path.startswith("/") or ".." in Path(path).parts or path.startswith(".git/"):
                      continue

                  if path in allowed_files:
                      requested.append(path)

              needed_path.write_text("\n".join(requested) + "\n", encoding="utf-8")
              sys.exit(20)

          files = data.get("files")

          if not isinstance(files, list):
              fail("Failure type: invalid_json\nAI response JSON must contain either needs_files or files array.")

          changed_count = 0

          blocked_suffixes = (
              ".env",
              ".env.local",
              ".env.production",
              ".env.development",
          )

          for item in files:
              if not isinstance(item, dict):
                  fail("Failure type: invalid_json\nEach files item must be an object.")

              path = item.get("path")
              content = item.get("content")

              if not isinstance(path, str) or not path.strip():
                  fail("Failure type: invalid_json\nEach files item must contain a path string.")

              if not isinstance(content, str):
                  fail(f"Failure type: invalid_json\nFile {path} must contain a content string.")

              path = path.strip()

              if path.startswith("/") or ".." in Path(path).parts or path.startswith(".git/"):
                  fail(f"Failure type: unsafe_file\nUnsafe file path rejected: {path}")

              if Path(path).name in blocked_suffixes or Path(path).name.startswith(".env"):
                  fail(f"Failure type: unsafe_file\nRefusing to edit env file: {path}")

              if path not in allowed_files:
                  fail(f"Failure type: file_not_allowed\nFile path is not in allowed files list: {path}")

              target = repo / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content, encoding="utf-8")
              changed_count += 1

          if changed_count == 0:
