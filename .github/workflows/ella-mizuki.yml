name: Ella Mizuki

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  ella-mizuki:
    if: >
      startsWith(github.event.comment.body, '/ella') &&
      github.event.comment.user.login == 'isyuricunha'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    concurrency:
      group: ella-mizuki-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: false

    env:
      ELLA_MAX_ATTEMPTS: ${{ secrets.ELLA_MAX_ATTEMPTS }}
      ELLA_TIME_LIMIT_SECONDS: ${{ secrets.ELLA_TIME_LIMIT_SECONDS }}

    steps:
      - name: Create app token
        id: ella_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.ELLA_APP_CLIENT_ID }}
          private-key: ${{ secrets.ELLA_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-actions: read

      - name: React to command
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="eyes" \
            >/dev/null || true

      - name: Parse command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -e

          MODE="unknown"
          PROMPT=""

          if [[ "$COMMENT_BODY" == "/ella help"* ]]; then
            MODE="help"
            PROMPT=""
          elif [[ "$COMMENT_BODY" == "/ella ask"* ]]; then
            MODE="ask"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella ask[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella pr"* ]]; then
            MODE="pr"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella pr[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella review"* ]]; then
            MODE="review"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella review[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella plan"* ]]; then
            MODE="plan"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella plan[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella label"* ]]; then
            MODE="label"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella label[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella fix"* ]]; then
            MODE="fix"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella fix[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella continue"* ]]; then
            MODE="continue"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella continue[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella solve"* ]]; then
            MODE="solve"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella solve[[:space:]]*##')"
          fi

          if [ "$MODE" = "ask" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Reply with one short sentence saying everything is working."
          fi

          if [ "$MODE" = "pr" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Analyze this PR briefly. Explain what changed, possible risks, and whether it looks safe to merge."
          fi

          if [ "$MODE" = "review" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Do a serious code review for this PR. Look for bugs, regressions, security risks, type issues, and missing tests."
          fi

          if [ "$MODE" = "plan" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Create a short, practical plan. Do not edit anything."
          fi

          if [ "$MODE" = "label" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Classify this issue or PR using common relevant labels."
          fi

          if [ "$MODE" = "fix" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Fix the problem described in the PR or comment. Make the smallest safe change possible."
          fi

          if [ "$MODE" = "continue" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Continue trying to fix this PR with the smallest safe change possible."
          fi

          if [ "$MODE" = "solve" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Solve this issue with the smallest safe change possible."
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          printf "%s" "$PROMPT" > "$RUNNER_TEMP/ella-user-prompt.txt"

      - name: Comment help
        if: ${{ steps.parse.outputs.mode == 'help' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Available commands:

          \`/ella ask your question\`
          I answer using the configured model.

          \`/ella pr request\`
          I give a short PR analysis.

          \`/ella review request\`
          I do a stricter PR code review.

          \`/ella plan request\`
          I write a plan without editing files.

          \`/ella label\`
          I apply common labels to the issue or PR.

          \`/ella fix request\`
          I try to fix the current PR, run checks, and commit as Yuri Cunha.

          \`/ella continue request\`
          I continue trying to fix the current PR with more attempts.

          \`/ella solve request\`
          On an issue, I create a branch, try to solve it, run checks, and open a PR."

      - name: Comment unknown command
        if: ${{ steps.parse.outputs.mode == 'unknown' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "I do not recognize that command. Use \`/ella help\`."

      - name: Validate AI config
        if: >
          ${{
            steps.parse.outputs.mode == 'ask' ||
            steps.parse.outputs.mode == 'pr' ||
            steps.parse.outputs.mode == 'review' ||
            steps.parse.outputs.mode == 'plan' ||
            steps.parse.outputs.mode == 'label' ||
            steps.parse.outputs.mode == 'fix' ||
            steps.parse.outputs.mode == 'continue' ||
            steps.parse.outputs.mode == 'solve'
          }}
        env:
          ELLA_AI_BASE_URL: ${{ secrets.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ secrets.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
        run: |
          set -e

          echo "::add-mask::$ELLA_AI_BASE_URL"
          echo "::add-mask::$ELLA_AI_MODEL"
          echo "::add-mask::$ELLA_AI_API_KEY"

          if [ -z "$ELLA_AI_BASE_URL" ]; then
            echo "Missing secret: ELLA_AI_BASE_URL"
            exit 1
          fi

          if [ -z "$ELLA_AI_MODEL" ]; then
            echo "Missing secret: ELLA_AI_MODEL"
            exit 1
          fi

          if [ -z "$ELLA_AI_API_KEY" ]; then
            echo "Missing secret: ELLA_AI_API_KEY"
            exit 1
          fi

      - name: Stop PR-only commands outside PR
        if: >
          ${{
            !github.event.issue.pull_request &&
            (
              steps.parse.outputs.mode == 'pr' ||
              steps.parse.outputs.mode == 'review' ||
              steps.parse.outputs.mode == 'fix' ||
              steps.parse.outputs.mode == 'continue'
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "That command needs to be used inside a PR."

      - name: Stop solve inside PR
        if: ${{ github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Use \`/ella fix\` inside a PR. Use \`/ella solve\` on an issue."

      - name: Prepare ask context
        if: ${{ steps.parse.outputs.mode == 'ask' }}
        run: |
          {
            echo "User request:"
            cat "$RUNNER_TEMP/ella-user-prompt.txt"
          } > "$RUNNER_TEMP/ella-context.txt"

      - name: Read PR metadata
        id: pr
        if: >
          ${{
            github.event.issue.pull_request &&
            (
              steps.parse.outputs.mode == 'pr' ||
              steps.parse.outputs.mode == 'review' ||
              steps.parse.outputs.mode == 'plan' ||
              steps.parse.outputs.mode == 'label' ||
              steps.parse.outputs.mode == 'fix' ||
              steps.parse.outputs.mode == 'continue'
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          ELLA_MAX_CONTEXT_PR_DIFF_BYTES: ${{ secrets.ELLA_MAX_CONTEXT_PR_DIFF_BYTES }}
        run: |
          set -e

          PR_DIFF_LIMIT="${ELLA_MAX_CONTEXT_PR_DIFF_BYTES:-500000}"

          gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json title,body,author,baseRefName,headRefName,headRepository,headRepositoryOwner,isCrossRepository,isDraft,state,url \
            > "$RUNNER_TEMP/pr-info.json"

          gh pr diff "$PR_NUMBER" \
            --repo "$REPO" \
            > "$RUNNER_TEMP/pr-diff.txt"

          head -c "$PR_DIFF_LIMIT" "$RUNNER_TEMP/pr-diff.txt" > "$RUNNER_TEMP/pr-diff-limited.txt"

          HEAD_REF="$(jq -r '.headRefName' "$RUNNER_TEMP/pr-info.json")"
          BASE_REF="$(jq -r '.baseRefName' "$RUNNER_TEMP/pr-info.json")"
          IS_CROSS_REPOSITORY="$(jq -r '.isCrossRepository' "$RUNNER_TEMP/pr-info.json")"

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "is_cross_repository=$IS_CROSS_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Read issue metadata
        id: issue
        if: >
          ${{
            !github.event.issue.pull_request &&
            (
              steps.parse.outputs.mode == 'plan' ||
              steps.parse.outputs.mode == 'label' ||
              steps.parse.outputs.mode == 'solve'
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -e

          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json title,body,author,url,number,state \
            > "$RUNNER_TEMP/issue-info.json"

          if [ "${{ steps.parse.outputs.mode }}" = "solve" ]; then
            ISSUE_TITLE="$(jq -r '.title' "$RUNNER_TEMP/issue-info.json")"
            SAFE_TITLE="$(printf "%s" "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-50)"

            if [ -z "$SAFE_TITLE" ]; then
              SAFE_TITLE="issue"
            fi

            BRANCH_NAME="ella/issue-${ISSUE_NUMBER}-${SAFE_TITLE}-${GITHUB_RUN_ID}"

            echo "base_ref=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"
            echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare read-only context
        if: >
          ${{
            steps.parse.outputs.mode == 'pr' ||
            steps.parse.outputs.mode == 'review' ||
            steps.parse.outputs.mode == 'plan' ||
            steps.parse.outputs.mode == 'label'
          }}
        run: |
          set -e

          {
            echo "User request:"
            cat "$RUNNER_TEMP/ella-user-prompt.txt"

            echo ""
            echo "Mode: ${{ steps.parse.outputs.mode }}"
          } > "$RUNNER_TEMP/ella-context.txt"

          if [ "${{ steps.parse.outputs.mode }}" = "label" ]; then
            {
              echo ""
              echo "Allowed labels:"
              echo "- bug"
              echo "- enhancement"
              echo "- documentation"
              echo "- dependencies"
              echo "- security"
              echo "- performance"
              echo "- refactor"
              echo "- tests"
              echo "- ui"
              echo "- frontend"
              echo "- backend"
              echo "- i18n"
              echo "- ci"
              echo "- chore"
              echo "- question"
              echo "- good first issue"
              echo "- help wanted"
              echo ""
              echo "Return ONLY valid JSON with this schema:"
              echo "{"
              echo "  \"summary\": \"short reason\","
              echo "  \"labels\": [\"bug\", \"frontend\"]"
              echo "}"
            } >> "$RUNNER_TEMP/ella-context.txt"
          fi

          if [ -f "$RUNNER_TEMP/pr-info.json" ]; then
            {
              echo ""
              echo "PR info:"
              cat "$RUNNER_TEMP/pr-info.json"

              echo ""
              echo "PR diff, possibly truncated:"
              cat "$RUNNER_TEMP/pr-diff-limited.txt"
            } >> "$RUNNER_TEMP/ella-context.txt"
          fi

          if [ -f "$RUNNER_TEMP/issue-info.json" ]; then
            {
              echo ""
              echo "Issue info:"
              cat "$RUNNER_TEMP/issue-info.json"
            } >> "$RUNNER_TEMP/ella-context.txt"
          fi

      - name: Stop fix on fork PR
        if: ${{ github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') && steps.pr.outputs.is_cross_repository == 'true' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "I will not apply automatic fixes to PRs coming from forks. For safety, I only commit to branches from this repository."

      - name: Checkout repository for fix
        if: ${{ github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') && steps.pr.outputs.is_cross_repository == 'false' }}
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ella_token.outputs.token }}
          fetch-depth: 0

      - name: Checkout PR branch
        if: ${{ github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') && steps.pr.outputs.is_cross_repository == 'false' }}
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -e

          git fetch origin "refs/heads/${HEAD_REF}:refs/remotes/origin/${HEAD_REF}"
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"

      - name: Checkout repository for solve
        if: ${{ !github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ella_token.outputs.token }}
          fetch-depth: 0
          ref: ${{ steps.issue.outputs.base_ref }}

      - name: Create solve branch
        if: ${{ !github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        env:
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e
          git checkout -B "$BRANCH_NAME"

      - name: Load repository instructions
        if: >
          ${{
            (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') && steps.pr.outputs.is_cross_repository == 'false') ||
            (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
          }}
        run: |
          set -e

          : > "$RUNNER_TEMP/ella-repo-instructions.txt"

          for file in AGENTS.md ELLA.md .github/ella-instructions.md .github/copilot-instructions.md; do
            if [ -f "$file" ]; then
              {
                echo ""
                echo "----- INSTRUCTIONS: $file -----"
                head -c 40000 "$file"
                echo ""
                echo "----- END INSTRUCTIONS: $file -----"
              } >> "$RUNNER_TEMP/ella-repo-instructions.txt"
            fi
          done

      - name: Create progress comment
        id: progress_comment
        if: >
          ${{
            (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') && steps.pr.outputs.is_cross_repository == 'false') ||
            (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          MODE: ${{ steps.parse.outputs.mode }}
        run: |
          set -e

          MAX_ATTEMPTS="${ELLA_MAX_ATTEMPTS:-15}"
          TIME_LIMIT_SECONDS="${ELLA_TIME_LIMIT_SECONDS:-3600}"
          TIME_LIMIT_MINUTES=$((TIME_LIMIT_SECONDS / 60))

          if [ "$MODE" = "solve" ]; then
            BODY="👀 I started working on this issue.

          Status: preparing branch and context.
          Limit: ${MAX_ATTEMPTS} attempts / ${TIME_LIMIT_MINUTES} minutes."
          elif [ "$MODE" = "continue" ]; then
            BODY="👀 I will continue trying to fix this PR.

          Status: preparing context.
          Limit: ${MAX_ATTEMPTS} attempts / ${TIME_LIMIT_MINUTES} minutes."
          else
            BODY="👀 I started working on this PR.

          Status: preparing context.
          Limit: ${MAX_ATTEMPTS} attempts / ${TIME_LIMIT_MINUTES} minutes."
          fi

          COMMENT_ID="$(gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -f body="$BODY" \
            --jq '.id')"

          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Prepare fix files list
        if: ${{ github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') && steps.pr.outputs.is_cross_repository == 'false' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e

          gh pr diff "$PR_NUMBER" \
            --repo "$REPO" \
            --name-only \
            > "$RUNNER_TEMP/ella-allowed-files.txt"

      - name: Prepare solve files list
        if: ${{ !github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        env:
          ELLA_MAX_CONTEXT_REPO_FILES_BYTES: ${{ secrets.ELLA_MAX_CONTEXT_REPO_FILES_BYTES }}
        run: |
          set -e

          REPO_FILES_LIMIT="${ELLA_MAX_CONTEXT_REPO_FILES_BYTES:-200000}"

          git ls-files \
            ':!:**/.env' \
            ':!:**/.env.*' \
            ':!:**/node_modules/**' \
            ':!:**/.git/**' \
            ':!:**/dist/**' \
            ':!:**/build/**' \
            ':!:**/.next/**' \
            ':!:**/coverage/**' \
            > "$RUNNER_TEMP/ella-allowed-files.txt"

          head -c "$REPO_FILES_LIMIT" "$RUNNER_TEMP/ella-allowed-files.txt" > "$RUNNER_TEMP/ella-repo-files-limited.txt"

      - name: Call AI endpoint for read-only command
        if: >
          ${{
            steps.parse.outputs.mode == 'ask' ||
            steps.parse.outputs.mode == 'pr' ||
            steps.parse.outputs.mode == 'review' ||
            steps.parse.outputs.mode == 'plan' ||
            steps.parse.outputs.mode == 'label'
          }}
        env:
          ELLA_AI_BASE_URL: ${{ secrets.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ secrets.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
          ELLA_MODE: ${{ steps.parse.outputs.mode }}
          ELLA_MAX_TOKENS_ASK: ${{ secrets.ELLA_MAX_TOKENS_ASK }}
          ELLA_MAX_TOKENS_PR: ${{ secrets.ELLA_MAX_TOKENS_PR }}
          ELLA_MAX_TOKENS_REVIEW: ${{ secrets.ELLA_MAX_TOKENS_REVIEW }}
          ELLA_MAX_TOKENS_PLAN: ${{ secrets.ELLA_MAX_TOKENS_PLAN }}
          ELLA_MAX_TOKENS_LABEL: ${{ secrets.ELLA_MAX_TOKENS_LABEL }}
        run: |
          set -e

          echo "::add-mask::$ELLA_AI_BASE_URL"
          echo "::add-mask::$ELLA_AI_MODEL"
          echo "::add-mask::$ELLA_AI_API_KEY"

          if [ "$ELLA_MODE" = "review" ]; then
            SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. Write in English. Use first person when referring to yourself. Do not refer to yourself in the third person. Do a serious code review. Be direct. Focus on bugs, security risks, regressions, type issues, missing tests, breaking changes, and suspicious code. Do not modify code."
            MAX_TOKENS="${ELLA_MAX_TOKENS_REVIEW:-4096}"
          elif [ "$ELLA_MODE" = "plan" ]; then
            SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. Write in English. Use first person when referring to yourself. Do not refer to yourself in the third person. Create a practical implementation plan. Do not modify code. Include likely files, steps, risks, and checks."
            MAX_TOKENS="${ELLA_MAX_TOKENS_PLAN:-4096}"
          elif [ "$ELLA_MODE" = "label" ]; then
            SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. Write in English. Classify the issue or PR with common GitHub labels. Return only valid JSON. No Markdown. No code fences."
            MAX_TOKENS="${ELLA_MAX_TOKENS_LABEL:-1200}"
          elif [ "$ELLA_MODE" = "pr" ]; then
            SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. Write in English. Use first person when referring to yourself. Do not refer to yourself in the third person. Be short, direct, and practical. Analyze only the PR context provided. Do not modify code."
            MAX_TOKENS="${ELLA_MAX_TOKENS_PR:-4096}"
          else
            SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. Write in English. Use first person when referring to yourself. Do not refer to yourself in the third person. Be short, direct, and practical."
            MAX_TOKENS="${ELLA_MAX_TOKENS_ASK:-2048}"
          fi

          REQUEST_BODY="$(jq -n \
            --arg model "$ELLA_AI_MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --rawfile context "$RUNNER_TEMP/ella-context.txt" \
            --argjson max_tokens "$MAX_TOKENS" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: $system
                },
                {
                  role: "user",
                  content: $context
                }
              ],
              temperature: 0,
              max_tokens: $max_tokens,
              stream: true
            }')"

          HTTP_STATUS="$(curl -sS \
            --no-buffer \
            --connect-timeout 20 \
            --max-time 900 \
            -o "$RUNNER_TEMP/response.stream" \
            -w "%{http_code}" \
            -X POST "${ELLA_AI_BASE_URL%/}/chat/completions" \
            -H "Authorization: Bearer ${ELLA_AI_API_KEY}" \
            -H "Content-Type: application/json" \
            --data "$REQUEST_BODY")"

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "AI endpoint failed"
            cat "$RUNNER_TEMP/response.stream"
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import sys

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          response_path = runner_temp / "response.stream"
          output_path = runner_temp / "ai-response.txt"

          text = response_path.read_text(encoding="utf-8", errors="replace")
          stripped = text.strip()

          if not stripped:
              print("Empty AI stream response", file=sys.stderr)
              sys.exit(1)

          content_parts = []
          reasoning_parts = []

          def collect_from_choice(choice):
              delta = choice.get("delta") or {}
              message = choice.get("message") or {}

              content = delta.get("content") or message.get("content") or choice.get("text")
              if content:
                  content_parts.append(content)

