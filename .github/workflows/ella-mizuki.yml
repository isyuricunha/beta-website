          apply_ai_response() {
            python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re
          import sys

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          repo = Path.cwd()

          response_path = runner_temp / "ai-response.txt"
          allowed_path = runner_temp / "ella-allowed-files.txt"
          summary_path = runner_temp / "ella-fix-summary.txt"
          error_path = runner_temp / "ella-apply-error.txt"
          needed_path = runner_temp / "ella-needed-files.txt"

          raw = response_path.read_text(encoding="utf-8", errors="replace").strip()

          def fail(message):
              error_path.write_text(message + "\n\nAI response preview:\n" + raw[:4000], encoding="utf-8")
              print(message, file=sys.stderr)
              sys.exit(1)

          if raw.startswith("```"):
              raw = re.sub(r"^```(?:json)?\s*", "", raw)
              raw = re.sub(r"\s*```$", "", raw).strip()

          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              start = raw.find("{")
              end = raw.rfind("}")
              if start == -1 or end == -1 or end <= start:
                  fail("Failure type: invalid_json\nAI response is not valid JSON.")
              try:
                  data = json.loads(raw[start:end + 1])
              except json.JSONDecodeError as exc:
                  fail(f"Failure type: invalid_json\nAI response JSON parse failed: {exc}")

          if not isinstance(data, dict):
              fail("Failure type: invalid_json\nAI response JSON must be an object.")

          summary = data.get("summary") or "I applied the requested fix."
          summary_path.write_text(str(summary).strip() + "\n", encoding="utf-8")

          allowed_files = set()
          if allowed_path.exists():
