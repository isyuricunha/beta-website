name: Ella Mizuki

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  ella-mizuki:
    if: >
      startsWith(github.event.comment.body, '/ella') &&
      github.event.comment.user.login == 'isyuricunha'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    concurrency:
      group: ella-mizuki-${{ github.repository }}-${{ github.event.issue.number }}
      cancel-in-progress: false

    env:
      ELLA_MAX_ATTEMPTS: 15
      ELLA_TIME_LIMIT_SECONDS: 3600

    steps:
      - name: Create Ella Mizuki token
        id: ella_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.YUE_APP_CLIENT_ID }}
          private-key: ${{ secrets.YUE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-actions: read

      - name: React to command
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="eyes" \
            >/dev/null || true

      - name: Parse command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -e

          MODE="unknown"
          PROMPT=""

          if [[ "$COMMENT_BODY" == "/ella help"* ]]; then
            MODE="help"
            PROMPT=""
          elif [[ "$COMMENT_BODY" == "/ella ask"* ]]; then
            MODE="ask"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella ask[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella pr"* ]]; then
            MODE="pr"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella pr[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella fix"* ]]; then
            MODE="fix"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella fix[[:space:]]*##')"
          elif [[ "$COMMENT_BODY" == "/ella solve"* ]]; then
            MODE="solve"
            PROMPT="$(printf "%s" "$COMMENT_BODY" | sed '1s#^/ella solve[[:space:]]*##')"
          fi

          if [ "$MODE" = "ask" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Responda com uma frase curta dizendo que a Ella Mizuki está funcionando."
          fi

          if [ "$MODE" = "pr" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Analise este PR de forma curta e prática. Mostre o que mudou, riscos e se parece seguro fazer merge."
          fi

          if [ "$MODE" = "fix" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Corrija o problema descrito no PR ou no comentário. Faça a menor mudança possível."
          fi

          if [ "$MODE" = "solve" ] && [ -z "$(printf "%s" "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Resolva esta issue com a menor mudança segura possível."
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          printf "%s" "$PROMPT" > "$RUNNER_TEMP/ella-user-prompt.txt"

      - name: Comment help
        if: ${{ steps.parse.outputs.mode == 'help' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Comandos disponíveis:

          \`/ella ask sua pergunta\`
          Responde usando o modelo configurado.

          \`/ella pr pedido\`
          Analisa o PR atual usando título, descrição e diff.

          \`/ella fix pedido\`
          Corrige o PR atual em loop controlado, roda checks e commita como Yuri Cunha.

          \`/ella solve pedido\`
          Em uma issue, cria uma branch, tenta resolver, roda checks e abre PR."

      - name: Comment unknown command
        if: ${{ steps.parse.outputs.mode == 'unknown' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Comando não reconhecido. Use \`/ella help\`."

      - name: Validate AI config
        if: >
          ${{
            steps.parse.outputs.mode == 'ask' ||
            steps.parse.outputs.mode == 'pr' ||
            steps.parse.outputs.mode == 'fix' ||
            steps.parse.outputs.mode == 'solve'
          }}
        env:
          ELLA_AI_BASE_URL: ${{ secrets.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ secrets.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
        run: |
          set -e

          echo "::add-mask::$ELLA_AI_BASE_URL"
          echo "::add-mask::$ELLA_AI_MODEL"
          echo "::add-mask::$ELLA_AI_API_KEY"

          if [ -z "$ELLA_AI_BASE_URL" ]; then
            echo "Missing secret: ELLA_AI_BASE_URL"
            exit 1
          fi

          if [ -z "$ELLA_AI_MODEL" ]; then
            echo "Missing secret: ELLA_AI_MODEL"
            exit 1
          fi

          if [ -z "$ELLA_AI_API_KEY" ]; then
            echo "Missing secret: ELLA_AI_API_KEY"
            exit 1
          fi

      - name: Stop PR commands outside PR
        if: ${{ !github.event.issue.pull_request && (steps.parse.outputs.mode == 'pr' || steps.parse.outputs.mode == 'fix') }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Esse comando precisa ser usado dentro de um PR."

      - name: Stop solve inside PR
        if: ${{ github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Use \`/ella fix\` dentro de PR. Use \`/ella solve\` em issue."

      - name: Prepare ask context
        if: ${{ steps.parse.outputs.mode == 'ask' }}
        run: |
          {
            echo "User request:"
            cat "$RUNNER_TEMP/ella-user-prompt.txt"
          } > "$RUNNER_TEMP/ella-context.txt"

      - name: Read PR metadata
        id: pr
        if: ${{ github.event.issue.pull_request && (steps.parse.outputs.mode == 'pr' || steps.parse.outputs.mode == 'fix') }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e

          gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json title,body,author,baseRefName,headRefName,headRepository,headRepositoryOwner,isCrossRepository,isDraft,state,url \
            > "$RUNNER_TEMP/pr-info.json"

          gh pr diff "$PR_NUMBER" \
            --repo "$REPO" \
            > "$RUNNER_TEMP/pr-diff.txt"

          if [ "${{ steps.parse.outputs.mode }}" = "fix" ]; then
            head -c 30000 "$RUNNER_TEMP/pr-diff.txt" > "$RUNNER_TEMP/pr-diff-limited.txt"
          else
            head -c 80000 "$RUNNER_TEMP/pr-diff.txt" > "$RUNNER_TEMP/pr-diff-limited.txt"
          fi

          HEAD_REF="$(jq -r '.headRefName' "$RUNNER_TEMP/pr-info.json")"
          BASE_REF="$(jq -r '.baseRefName' "$RUNNER_TEMP/pr-info.json")"
          IS_CROSS_REPOSITORY="$(jq -r '.isCrossRepository' "$RUNNER_TEMP/pr-info.json")"

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "is_cross_repository=$IS_CROSS_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Read issue metadata
        id: issue
        if: ${{ !github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -e

          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json title,body,author,url,number,state \
            > "$RUNNER_TEMP/issue-info.json"

          ISSUE_TITLE="$(jq -r '.title' "$RUNNER_TEMP/issue-info.json")"
          SAFE_TITLE="$(printf "%s" "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-50)"

          if [ -z "$SAFE_TITLE" ]; then
            SAFE_TITLE="issue"
          fi

          BRANCH_NAME="ella/issue-${ISSUE_NUMBER}-${SAFE_TITLE}-${GITHUB_RUN_ID}"

          echo "base_ref=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create progress comment
        id: progress_comment
        if: >
          ${{
            (github.event.issue.pull_request && steps.parse.outputs.mode == 'fix' && steps.pr.outputs.is_cross_repository == 'false') ||
            (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          MODE: ${{ steps.parse.outputs.mode }}
        run: |
          set -e

          if [ "$MODE" = "solve" ]; then
            BODY="👀 Ella Mizuki começou a trabalhar nesta issue.

          Status: preparando branch e contexto.
          Limite: 15 tentativas / 60 minutos."
          else
            BODY="👀 Ella Mizuki começou a trabalhar neste PR.

          Status: preparando contexto.
          Limite: 15 tentativas / 60 minutos."
          fi

          COMMENT_ID="$(gh api \
            --method POST \
            "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -f body="$BODY" \
            --jq '.id')"

          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Prepare PR analysis context
        if: ${{ github.event.issue.pull_request && steps.parse.outputs.mode == 'pr' }}
        run: |
          {
            echo "User request:"
            cat "$RUNNER_TEMP/ella-user-prompt.txt"

            echo ""
            echo "PR info:"
            cat "$RUNNER_TEMP/pr-info.json"

            echo ""
            echo "PR diff, possibly truncated:"
            cat "$RUNNER_TEMP/pr-diff-limited.txt"
          } > "$RUNNER_TEMP/ella-context.txt"

      - name: Stop fix on fork PR
        if: ${{ github.event.issue.pull_request && steps.parse.outputs.mode == 'fix' && steps.pr.outputs.is_cross_repository == 'true' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "Não vou aplicar fix automático em PR vindo de fork. Por segurança, só faço commit automático em branch do próprio repo."

      - name: Checkout repository for fix
        if: ${{ github.event.issue.pull_request && steps.parse.outputs.mode == 'fix' && steps.pr.outputs.is_cross_repository == 'false' }}
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ella_token.outputs.token }}
          fetch-depth: 0

      - name: Checkout PR branch
        if: ${{ github.event.issue.pull_request && steps.parse.outputs.mode == 'fix' && steps.pr.outputs.is_cross_repository == 'false' }}
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -e

          git fetch origin "refs/heads/${HEAD_REF}:refs/remotes/origin/${HEAD_REF}"
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"

      - name: Checkout repository for solve
        if: ${{ !github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ella_token.outputs.token }}
          fetch-depth: 0
          ref: ${{ steps.issue.outputs.base_ref }}

      - name: Create solve branch
        if: ${{ !github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        env:
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e
          git checkout -B "$BRANCH_NAME"

      - name: Load repository instructions
        if: >
          ${{
            (github.event.issue.pull_request && steps.parse.outputs.mode == 'fix' && steps.pr.outputs.is_cross_repository == 'false') ||
            (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
          }}
        run: |
          set -e

          : > "$RUNNER_TEMP/ella-repo-instructions.txt"

          for file in AGENTS.md ELLA.md .github/ella-instructions.md .github/copilot-instructions.md; do
            if [ -f "$file" ]; then
              {
                echo ""
                echo "----- INSTRUCTIONS: $file -----"
                head -c 40000 "$file"
                echo ""
                echo "----- END INSTRUCTIONS: $file -----"
              } >> "$RUNNER_TEMP/ella-repo-instructions.txt"
            fi
          done

      - name: Prepare fix files list
        if: ${{ github.event.issue.pull_request && steps.parse.outputs.mode == 'fix' && steps.pr.outputs.is_cross_repository == 'false' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e

          gh pr diff "$PR_NUMBER" \
            --repo "$REPO" \
            --name-only \
            > "$RUNNER_TEMP/ella-allowed-files.txt"

      - name: Prepare solve files list
        if: ${{ !github.event.issue.pull_request && steps.parse.outputs.mode == 'solve' }}
        run: |
          set -e

          git ls-files \
            ':!:**/.env' \
            ':!:**/.env.*' \
            ':!:**/node_modules/**' \
            ':!:**/.git/**' \
            ':!:**/dist/**' \
            ':!:**/build/**' \
            ':!:**/.next/**' \
            ':!:**/coverage/**' \
            > "$RUNNER_TEMP/ella-allowed-files.txt"

          head -c 60000 "$RUNNER_TEMP/ella-allowed-files.txt" > "$RUNNER_TEMP/ella-repo-files-limited.txt"

      - name: Call AI endpoint for ask or PR analysis
        if: ${{ steps.parse.outputs.mode == 'ask' || (github.event.issue.pull_request && steps.parse.outputs.mode == 'pr') }}
        env:
          ELLA_AI_BASE_URL: ${{ secrets.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ secrets.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
          ELLA_MODE: ${{ steps.parse.outputs.mode }}
        run: |
          set -e

          echo "::add-mask::$ELLA_AI_BASE_URL"
          echo "::add-mask::$ELLA_AI_MODEL"
          echo "::add-mask::$ELLA_AI_API_KEY"

          if [ "$ELLA_MODE" = "pr" ]; then
            SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. Answer in Brazilian Portuguese. Be short, direct, and practical. Analyze only the PR context provided. Do not modify code."
            MAX_TOKENS=1200
          else
            SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. Answer in Brazilian Portuguese. Be short, direct, and practical."
            MAX_TOKENS=600
          fi

          REQUEST_BODY="$(jq -n \
            --arg model "$ELLA_AI_MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --rawfile context "$RUNNER_TEMP/ella-context.txt" \
            --argjson max_tokens "$MAX_TOKENS" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: $system
                },
                {
                  role: "user",
                  content: $context
                }
              ],
              temperature: 0,
              max_tokens: $max_tokens,
              stream: true
            }')"

          HTTP_STATUS="$(curl -sS \
            --no-buffer \
            --connect-timeout 20 \
            --max-time 900 \
            -o "$RUNNER_TEMP/response.stream" \
            -w "%{http_code}" \
            -X POST "${ELLA_AI_BASE_URL%/}/chat/completions" \
            -H "Authorization: Bearer ${ELLA_AI_API_KEY}" \
            -H "Content-Type: application/json" \
            --data "$REQUEST_BODY")"

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "AI endpoint failed"
            cat "$RUNNER_TEMP/response.stream"
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import sys

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          response_path = runner_temp / "response.stream"
          output_path = runner_temp / "ai-response.txt"

          text = response_path.read_text(encoding="utf-8", errors="replace")
          stripped = text.strip()

          if not stripped:
              print("Empty AI stream response", file=sys.stderr)
              sys.exit(1)

          content_parts = []
          reasoning_parts = []

          def collect_from_choice(choice):
              delta = choice.get("delta") or {}
              message = choice.get("message") or {}

              content = delta.get("content") or message.get("content") or choice.get("text")
              if content:
                  content_parts.append(content)

              reasoning = delta.get("reasoning") or message.get("reasoning") or choice.get("reasoning")
              if reasoning:
                  reasoning_parts.append(reasoning)

              for item in delta.get("reasoning_details") or []:
                  if isinstance(item, dict) and item.get("text"):
                      reasoning_parts.append(item["text"])

              for item in message.get("reasoning_details") or []:
                  if isinstance(item, dict) and item.get("text"):
                      reasoning_parts.append(item["text"])

          if stripped.startswith("{"):
              data = json.loads(stripped)
              for choice in data.get("choices") or []:
                  collect_from_choice(choice)
          else:
              for raw_line in text.splitlines():
                  line = raw_line.strip()

                  if not line or line.startswith(":") or not line.startswith("data:"):
                      continue

                  payload = line[len("data:"):].strip()

                  if not payload or payload == "[DONE]":
                      continue

                  try:
                      data = json.loads(payload)
                  except json.JSONDecodeError:
                      continue

                  for choice in data.get("choices") or []:
                      collect_from_choice(choice)

          content = "".join(content_parts).strip()

          if not content:
              content = "".join(reasoning_parts).strip()

          if not content:
              print("Could not extract content from AI stream response", file=sys.stderr)
              print(stripped[:4000], file=sys.stderr)
              sys.exit(1)

          output_path.write_text(content, encoding="utf-8")
          PY

      - name: Comment AI response
        if: ${{ steps.parse.outputs.mode == 'ask' || steps.parse.outputs.mode == 'pr' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          AI_RESPONSE="$(cat "$RUNNER_TEMP/ai-response.txt")"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "$AI_RESPONSE"

      - name: React ask or PR success
        if: ${{ steps.parse.outputs.mode == 'ask' || steps.parse.outputs.mode == 'pr' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="+1" \
            >/dev/null || true

      - name: Run Ella fix loop
        id: ella_loop
        if: >
          ${{
            (github.event.issue.pull_request && steps.parse.outputs.mode == 'fix' && steps.pr.outputs.is_cross_repository == 'false') ||
            (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          ELLA_AI_BASE_URL: ${{ secrets.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ secrets.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
          ELLA_MODE: ${{ steps.parse.outputs.mode }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PROGRESS_COMMENT_ID: ${{ steps.progress_comment.outputs.comment_id }}
        run: |
          set -e

          echo "::add-mask::$ELLA_AI_BASE_URL"
          echo "::add-mask::$ELLA_AI_MODEL"
          echo "::add-mask::$ELLA_AI_API_KEY"

          START_TS="$(date +%s)"
          ATTEMPT=1
          SUCCESS="false"

          : > "$RUNNER_TEMP/ella-extra-context.txt"
          : > "$RUNNER_TEMP/ella-feedback.txt"
          : > "$RUNNER_TEMP/ella-final-summary.md"

          update_progress() {
            BODY="$1"

            if [ -z "$PROGRESS_COMMENT_ID" ]; then
              return 0
            fi

            gh api \
              --method PATCH \
              "repos/${REPO}/issues/comments/${PROGRESS_COMMENT_ID}" \
              -f body="$BODY" \
              >/dev/null || true
          }

          run_check() {
            NAME="$1"
            shift

            LOG_FILE="$RUNNER_TEMP/ella-check-${NAME}.log"

            echo "Running $NAME..."

            if "$@" > "$LOG_FILE" 2>&1; then
              echo "- ✅ $NAME" >> "$RUNNER_TEMP/ella-checks-summary.md"
              return 0
            fi

            echo "- ❌ $NAME" >> "$RUNNER_TEMP/ella-checks-summary.md"
            echo "" >> "$RUNNER_TEMP/ella-checks-summary.md"
            echo "Últimas linhas de $NAME:" >> "$RUNNER_TEMP/ella-checks-summary.md"
            echo '```txt' >> "$RUNNER_TEMP/ella-checks-summary.md"
            tail -n 100 "$LOG_FILE" >> "$RUNNER_TEMP/ella-checks-summary.md"
            echo '```' >> "$RUNNER_TEMP/ella-checks-summary.md"
            return 1
          }

          prepare_install_once() {
            if [ ! -f package.json ]; then
              echo "- ⚪ package.json não encontrado, sem install automático" > "$RUNNER_TEMP/ella-install-summary.md"
              return 0
            fi

            corepack enable || true

            if [ -f pnpm-lock.yaml ]; then
              INSTALL_COMMAND="pnpm install --frozen-lockfile"
              PACKAGE_RUNNER="pnpm run"
            elif [ -f package-lock.json ]; then
              INSTALL_COMMAND="npm ci"
              PACKAGE_RUNNER="npm run"
            elif [ -f yarn.lock ]; then
              INSTALL_COMMAND="yarn install --frozen-lockfile"
              PACKAGE_RUNNER="yarn"
            else
              INSTALL_COMMAND=""
              PACKAGE_RUNNER="npm run"
            fi

            echo "$PACKAGE_RUNNER" > "$RUNNER_TEMP/ella-package-runner.txt"

            if [ -z "$INSTALL_COMMAND" ]; then
              echo "- ⚠️ install: nenhum lockfile encontrado, pulando install automático" > "$RUNNER_TEMP/ella-install-summary.md"
              return 0
            fi

            echo "Running install once..."

            update_progress "👀 Ella Mizuki está preparando o ambiente.

          Status: instalando dependências.
          Tentativas: 0/${ELLA_MAX_ATTEMPTS}
          Limite: 60 minutos."

            if $INSTALL_COMMAND > "$RUNNER_TEMP/ella-install.log" 2>&1; then
              echo "- ✅ install" > "$RUNNER_TEMP/ella-install-summary.md"
              return 0
            fi

            {
              echo "- ❌ install"
              echo ""
              echo "Últimas linhas de install:"
              echo '```txt'
              tail -n 100 "$RUNNER_TEMP/ella-install.log"
              echo '```'
            } > "$RUNNER_TEMP/ella-install-summary.md"

            return 1
          }

          build_context() {
            {
              echo "You are running attempt ${ATTEMPT} of ${ELLA_MAX_ATTEMPTS}."
              echo "Time limit: ${ELLA_TIME_LIMIT_SECONDS} seconds."
              echo ""
              echo "User request:"
              cat "$RUNNER_TEMP/ella-user-prompt.txt"

              echo ""
              echo "Repository instructions:"
              cat "$RUNNER_TEMP/ella-repo-instructions.txt" 2>/dev/null || true

              echo ""
              echo "Required output format:"
              echo "Return ONLY valid JSON. No Markdown. No code fences."
              echo "Schema for editing files:"
              echo "{"
              echo "  \"summary\": \"short explanation\","
              echo "  \"files\": ["
              echo "    { \"path\": \"relative/path.ext\", \"content\": \"complete final file content\" }"
              echo "  ]"
              echo "}"
              echo ""
              echo "Optional schema if you need to inspect files before editing:"
              echo "{"
              echo "  \"summary\": \"need more file contents\","
              echo "  \"needs_files\": [\"relative/path.ext\"]"
              echo "}"
              echo ""
              echo "Rules:"
              echo "- Return complete final file content for every edited file."
              echo "- Keep the smallest safe change possible."
              echo "- Do not include explanations outside JSON."
              echo "- Do not edit secrets, env files, lockfiles, generated files, or files outside the allowed list."
              echo "- If previous feedback exists, fix that feedback only."

              echo ""
              echo "Previous feedback:"
              cat "$RUNNER_TEMP/ella-feedback.txt"

              echo ""
              echo "Extra file context requested in previous attempts:"
              cat "$RUNNER_TEMP/ella-extra-context.txt"

              echo ""
              echo "Allowed files:"
              cat "$RUNNER_TEMP/ella-allowed-files.txt"
            } > "$RUNNER_TEMP/ella-context.txt"

            if [ "$ELLA_MODE" = "fix" ]; then
              {
                echo ""
                echo "PR info:"
                cat "$RUNNER_TEMP/pr-info.json"

                echo ""
                echo "PR diff, truncated:"
                cat "$RUNNER_TEMP/pr-diff-limited.txt"

                echo ""
                echo "Allowed files current content, truncated:"
              } >> "$RUNNER_TEMP/ella-context.txt"

              while IFS= read -r file; do
                if [ -f "$file" ]; then
                  {
                    echo ""
                    echo "----- FILE: $file -----"
                    head -c 18000 "$file"
                    echo ""
                    echo "----- END FILE: $file -----"
                  } >> "$RUNNER_TEMP/ella-context.txt"
                fi
              done < "$RUNNER_TEMP/ella-allowed-files.txt"
            fi

            if [ "$ELLA_MODE" = "solve" ]; then
              {
                echo ""
                echo "Issue info:"
                cat "$RUNNER_TEMP/issue-info.json"

                echo ""
                echo "Repository files, truncated:"
                cat "$RUNNER_TEMP/ella-repo-files-limited.txt"

                echo ""
                echo "Common project files:"
              } >> "$RUNNER_TEMP/ella-context.txt"

              for file in package.json turbo.json pnpm-workspace.yaml README.md tsconfig.json; do
                if [ -f "$file" ]; then
                  {
                    echo ""
                    echo "----- FILE: $file -----"
                    head -c 12000 "$file"
                    echo ""
                    echo "----- END FILE: $file -----"
                  } >> "$RUNNER_TEMP/ella-context.txt"
                fi
              done
            fi
          }

          call_ai() {
            if [ "$ELLA_MODE" = "solve" ]; then
              SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. You are solving a GitHub issue by editing a branch and opening a PR. Return only valid JSON. No Markdown. No code fences. You may ask for file contents using needs_files. When editing, return a files array with complete final file contents."
              MAX_TOKENS=9000
            else
              SYSTEM_PROMPT="You are Ella Mizuki, Yuri's GitHub repository assistant. You are fixing an existing PR. Return only valid JSON. No Markdown. No code fences. You may ask for file contents using needs_files. When editing, return a files array with complete final file contents."
              MAX_TOKENS=9000
            fi

            REQUEST_BODY="$(jq -n \
              --arg model "$ELLA_AI_MODEL" \
              --arg system "$SYSTEM_PROMPT" \
              --rawfile context "$RUNNER_TEMP/ella-context.txt" \
              --argjson max_tokens "$MAX_TOKENS" \
              '{
                model: $model,
                messages: [
                  {
                    role: "system",
                    content: $system
                  },
                  {
                    role: "user",
                    content: $context
                  }
                ],
                temperature: 0,
                max_tokens: $max_tokens,
                stream: true
              }')"

            HTTP_STATUS="$(curl -sS \
              --no-buffer \
              --connect-timeout 20 \
              --max-time 900 \
              -o "$RUNNER_TEMP/response.stream" \
              -w "%{http_code}" \
              -X POST "${ELLA_AI_BASE_URL%/}/chat/completions" \
              -H "Authorization: Bearer ${ELLA_AI_API_KEY}" \
              -H "Content-Type: application/json" \
              --data "$REQUEST_BODY")"

            echo "HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
              {
                echo "AI endpoint failed with HTTP status $HTTP_STATUS."
                echo ""
                cat "$RUNNER_TEMP/response.stream"
              } > "$RUNNER_TEMP/ella-feedback.txt"

              return 1
            fi

            python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import sys

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          response_path = runner_temp / "response.stream"
          output_path = runner_temp / "ai-response.txt"

          text = response_path.read_text(encoding="utf-8", errors="replace")
          stripped = text.strip()

          if not stripped:
              print("Empty AI stream response", file=sys.stderr)
              sys.exit(1)

          content_parts = []
          reasoning_parts = []

          def collect_from_choice(choice):
              delta = choice.get("delta") or {}
              message = choice.get("message") or {}

              content = delta.get("content") or message.get("content") or choice.get("text")
              if content:
                  content_parts.append(content)

              reasoning = delta.get("reasoning") or message.get("reasoning") or choice.get("reasoning")
              if reasoning:
                  reasoning_parts.append(reasoning)

              for item in delta.get("reasoning_details") or []:
                  if isinstance(item, dict) and item.get("text"):
                      reasoning_parts.append(item["text"])

              for item in message.get("reasoning_details") or []:
                  if isinstance(item, dict) and item.get("text"):
                      reasoning_parts.append(item["text"])

          if stripped.startswith("{"):
              data = json.loads(stripped)
              for choice in data.get("choices") or []:
                  collect_from_choice(choice)
          else:
              for raw_line in text.splitlines():
                  line = raw_line.strip()

                  if not line or line.startswith(":") or not line.startswith("data:"):
                      continue

                  payload = line[len("data:"):].strip()

                  if not payload or payload == "[DONE]":
                      continue

                  try:
                      data = json.loads(payload)
                  except json.JSONDecodeError:
                      continue

                  for choice in data.get("choices") or []:
                      collect_from_choice(choice)

          content = "".join(content_parts).strip()

          if not content:
              content = "".join(reasoning_parts).strip()

          if not content:
              print("Could not extract content from AI stream response", file=sys.stderr)
              print(stripped[:4000], file=sys.stderr)
              sys.exit(1)

          output_path.write_text(content, encoding="utf-8")
          PY
          }

          apply_ai_response() {
            python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re
          import sys

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          repo = Path.cwd()

          response_path = runner_temp / "ai-response.txt"
          allowed_path = runner_temp / "ella-allowed-files.txt"
          summary_path = runner_temp / "ella-fix-summary.txt"
          error_path = runner_temp / "ella-apply-error.txt"
          needed_path = runner_temp / "ella-needed-files.txt"

          raw = response_path.read_text(encoding="utf-8", errors="replace").strip()

          def fail(message):
              error_path.write_text(message + "\n\nAI response preview:\n" + raw[:4000], encoding="utf-8")
              print(message, file=sys.stderr)
              sys.exit(1)

          if raw.startswith("```"):
              raw = re.sub(r"^```(?:json)?\s*", "", raw)
              raw = re.sub(r"\s*```$", "", raw).strip()

          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              start = raw.find("{")
              end = raw.rfind("}")
              if start == -1 or end == -1 or end <= start:
                  fail("AI response is not valid JSON.")
              try:
                  data = json.loads(raw[start:end + 1])
              except json.JSONDecodeError as exc:
                  fail(f"AI response JSON parse failed: {exc}")

          if not isinstance(data, dict):
              fail("AI response JSON must be an object.")

          summary = data.get("summary") or "Fix aplicado pela Ella Mizuki."
          summary_path.write_text(str(summary).strip() + "\n", encoding="utf-8")

          allowed_files = set()
          if allowed_path.exists():
              for line in allowed_path.read_text(encoding="utf-8", errors="replace").splitlines():
                  line = line.strip()
                  if line:
                      allowed_files.add(line)

          if not allowed_files:
              fail("Allowed files list is empty.")

          needs_files = data.get("needs_files")

          if isinstance(needs_files, list) and needs_files:
              requested = []

              for path in needs_files:
                  if not isinstance(path, str):
                      continue

                  path = path.strip()

                  if not path:
                      continue

                  if path.startswith("/") or ".." in Path(path).parts or path.startswith(".git/"):
                      continue

                  if path in allowed_files:
                      requested.append(path)

              needed_path.write_text("\n".join(requested) + "\n", encoding="utf-8")
              sys.exit(20)

          files = data.get("files")

          if not isinstance(files, list):
              fail("AI response JSON must contain either needs_files or files array.")

          changed_count = 0

          blocked_suffixes = (
              ".env",
              ".env.local",
              ".env.production",
              ".env.development",
          )

          for item in files:
              if not isinstance(item, dict):
                  fail("Each files item must be an object.")

              path = item.get("path")
              content = item.get("content")

              if not isinstance(path, str) or not path.strip():
                  fail("Each files item must contain a path string.")

              if not isinstance(content, str):
                  fail(f"File {path} must contain a content string.")

              path = path.strip()

              if path.startswith("/") or ".." in Path(path).parts or path.startswith(".git/"):
                  fail(f"Unsafe file path rejected: {path}")

              if Path(path).name in blocked_suffixes or Path(path).name.startswith(".env"):
                  fail(f"Refusing to edit env file: {path}")

              if path not in allowed_files:
                  fail(f"File path is not in allowed files list: {path}")

              target = repo / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content, encoding="utf-8")
              changed_count += 1

          if changed_count == 0:
              fail("AI returned zero files to change.")
          PY
          }

          append_needed_files_context() {
            if [ ! -s "$RUNNER_TEMP/ella-needed-files.txt" ]; then
              {
                echo "AI requested file contents, but no valid allowed files were requested."
              } > "$RUNNER_TEMP/ella-feedback.txt"

              return 1
            fi

            {
              echo ""
              echo "Files requested by AI:"
            } >> "$RUNNER_TEMP/ella-extra-context.txt"

            while IFS= read -r file; do
              if [ -f "$file" ]; then
                {
                  echo ""
                  echo "----- REQUESTED FILE: $file -----"
                  head -c 25000 "$file"
                  echo ""
                  echo "----- END REQUESTED FILE: $file -----"
                } >> "$RUNNER_TEMP/ella-extra-context.txt"
              else
                {
                  echo ""
                  echo "----- REQUESTED FILE MISSING: $file -----"
                } >> "$RUNNER_TEMP/ella-extra-context.txt"
              fi
            done < "$RUNNER_TEMP/ella-needed-files.txt"
          }

          run_project_checks() {
            {
              echo "Checks executados:"
              echo ""
              cat "$RUNNER_TEMP/ella-install-summary.md"
            } > "$RUNNER_TEMP/ella-checks-summary.md"

            FAILED=0

            if [ -f package.json ]; then
              PACKAGE_RUNNER="$(cat "$RUNNER_TEMP/ella-package-runner.txt" 2>/dev/null || echo "npm run")"

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.lint ? 0 : 1)"; then
                run_check "lint" $PACKAGE_RUNNER lint || FAILED=1
              else
                echo "- ⚪ lint: script não encontrado" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)"; then
                run_check "test" $PACKAGE_RUNNER test || FAILED=1
              else
                echo "- ⚪ test: script não encontrado" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.build ? 0 : 1)"; then
                run_check "build" $PACKAGE_RUNNER build || FAILED=1
              else
                echo "- ⚪ build: script não encontrado" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi
            else
              echo "- ⚪ package.json não encontrado, sem checks automáticos" >> "$RUNNER_TEMP/ella-checks-summary.md"
            fi

            return "$FAILED"
          }

          if ! prepare_install_once; then
            {
              echo "Install failed before Ella could safely edit."
              echo ""
              cat "$RUNNER_TEMP/ella-install-summary.md"
            } > "$RUNNER_TEMP/ella-final-summary.md"

            update_progress "❌ Ella Mizuki parou antes de editar.

          Motivo: install falhou.
          Artifact de debug será gerado se disponível."

            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while [ "$ATTEMPT" -le "$ELLA_MAX_ATTEMPTS" ]; do
            NOW_TS="$(date +%s)"
            ELAPSED=$((NOW_TS - START_TS))

            if [ "$ELAPSED" -ge "$ELLA_TIME_LIMIT_SECONDS" ]; then
              {
                echo "Tempo limite atingido antes de passar nos checks."
                echo ""
                echo "Tentativas usadas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}"
                echo "Tempo usado: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"
                echo ""
                echo "Último feedback:"
                cat "$RUNNER_TEMP/ella-feedback.txt"
              } > "$RUNNER_TEMP/ella-final-summary.md"

              update_progress "⏱️ Ella Mizuki atingiu o limite de tempo.

          Tentativas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}
          Tempo usado: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"

              break
            fi

            echo "Ella attempt ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}"

            update_progress "👀 Ella Mizuki está trabalhando.

          Status: tentativa ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Etapa: preparando contexto e chamando IA.
          Tempo usado: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"

            build_context

            if ! call_ai; then
              update_progress "⚠️ Ella Mizuki encontrou erro ao chamar a IA.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: tentar novamente, se houver tempo."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            set +e
            apply_ai_response
            APPLY_STATUS=$?
            set -e

            if [ "$APPLY_STATUS" = "20" ]; then
              append_needed_files_context || true
              {
                echo "A tentativa ${ATTEMPT} pediu mais arquivos. Forneci os arquivos válidos solicitados."
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "📖 Ella Mizuki pediu mais contexto.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Status: forneci arquivos extras permitidos."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            if [ "$APPLY_STATUS" != "0" ]; then
              {
                echo "A tentativa ${ATTEMPT} retornou JSON inválido ou não aplicável."
                echo ""
                cat "$RUNNER_TEMP/ella-apply-error.txt"
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ Ella Mizuki recebeu uma resposta não aplicável da IA.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: pedir correção do formato."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            set +e
            git diff --check > "$RUNNER_TEMP/ella-diff-check.txt" 2>&1
            DIFF_CHECK_STATUS=$?
            set -e

            if [ "$DIFF_CHECK_STATUS" != "0" ]; then
              {
                echo "A tentativa ${ATTEMPT} falhou em git diff --check."
                echo ""
                cat "$RUNNER_TEMP/ella-diff-check.txt"
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ Ella Mizuki aplicou mudanças, mas elas falharam em git diff --check.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: corrigir formatação/whitespace."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"

            if [ ! -s "$RUNNER_TEMP/ella-changed-files.txt" ]; then
              {
                echo "A tentativa ${ATTEMPT} não gerou mudanças reais nos arquivos."
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ Ella Mizuki não gerou mudanças reais.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: tentar novamente com feedback mais direto."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            update_progress "🧪 Ella Mizuki aplicou mudanças e está rodando checks.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Etapa: lint/test/build."

            set +e
            run_project_checks
            CHECK_STATUS=$?
            set -e

            if [ "$CHECK_STATUS" = "0" ]; then
              SUCCESS="true"

              {
                echo "Ella Mizuki conseguiu aplicar o fix."
                echo ""
                echo "Tentativas usadas: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}"
                echo ""
                echo "Resumo da IA:"
                cat "$RUNNER_TEMP/ella-fix-summary.txt"
                echo ""
                cat "$RUNNER_TEMP/ella-checks-summary.md"
              } > "$RUNNER_TEMP/ella-final-summary.md"

              update_progress "✅ Ella Mizuki passou nos checks.

          Tentativas usadas: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: commit/PR."

              break
            fi

            {
              echo "A tentativa ${ATTEMPT} aplicou mudanças, mas os checks falharam."
              echo ""
              cat "$RUNNER_TEMP/ella-checks-summary.md"
              echo ""
              echo "Corrija apenas os erros acima, preservando o comportamento atual."
            } > "$RUNNER_TEMP/ella-feedback.txt"

            update_progress "🔁 Ella Mizuki aplicou mudanças, mas os checks falharam.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: corrigir os erros dos checks e tentar novamente."

            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$SUCCESS" != "true" ]; then
            if [ ! -s "$RUNNER_TEMP/ella-final-summary.md" ]; then
              {
                echo "Ella Mizuki não conseguiu chegar em um fix válido dentro dos limites."
                echo ""
                echo "Tentativas usadas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}"
                echo ""
                echo "Último feedback:"
                cat "$RUNNER_TEMP/ella-feedback.txt"
              } > "$RUNNER_TEMP/ella-final-summary.md"
            fi

            update_progress "❌ Ella Mizuki não conseguiu passar nos checks dentro dos limites.

          Tentativas usadas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}
          Status: parei sem commit."

            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Upload Ella debug artifacts
        if: >
          ${{
            always() &&
            (
              (github.event.issue.pull_request && steps.parse.outputs.mode == 'fix') ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        uses: actions/upload-artifact@v4
        with:
          name: ella-mizuki-debug-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/ella-context.txt
            ${{ runner.temp }}/ella-feedback.txt
            ${{ runner.temp }}/ella-final-summary.md
            ${{ runner.temp }}/ella-repo-instructions.txt
            ${{ runner.temp }}/ella-extra-context.txt
            ${{ runner.temp }}/ella-allowed-files.txt
            ${{ runner.temp }}/ella-repo-files-limited.txt
            ${{ runner.temp }}/pr-info.json
            ${{ runner.temp }}/issue-info.json
            ${{ runner.temp }}/pr-diff-limited.txt
            ${{ runner.temp }}/response.stream
            ${{ runner.temp }}/ai-response.txt
            ${{ runner.temp }}/ella-fix-summary.txt
            ${{ runner.temp }}/ella-apply-error.txt
            ${{ runner.temp }}/ella-needed-files.txt
            ${{ runner.temp }}/ella-changed-files.txt
            ${{ runner.temp }}/ella-checks-summary.md
            ${{ runner.temp }}/ella-check-*.log
            ${{ runner.temp }}/ella-install.log
            ${{ runner.temp }}/ella-install-summary.md
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment loop failure
        if: >
          ${{
            steps.ella_loop.outputs.success == 'false' &&
            (
              (github.event.issue.pull_request && steps.parse.outputs.mode == 'fix') ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Tentei resolver em loop, mas não consegui passar nos checks dentro dos limites.

          ${SUMMARY}"

      - name: React loop failure
        if: >
          ${{
            steps.ella_loop.outputs.success == 'false' &&
            (
              (github.event.issue.pull_request && steps.parse.outputs.mode == 'fix') ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="confused" \
            >/dev/null || true

      - name: Commit and push fix as Yuri
        id: commit_fix
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'fix' }}
        env:
          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -e

          echo "::add-mask::$YURI_COMMIT_NAME"
          echo "::add-mask::$YURI_COMMIT_EMAIL"

          if [ -z "$YURI_COMMIT_NAME" ]; then
            echo "Missing secret: YURI_COMMIT_NAME"
            exit 1
          fi

          if [ -z "$YURI_COMMIT_EMAIL" ]; then
            echo "Missing secret: YURI_COMMIT_EMAIL"
            exit 1
          fi

          git config user.name "$YURI_COMMIT_NAME"
          git config user.email "$YURI_COMMIT_EMAIL"

          git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"
          xargs -a "$RUNNER_TEMP/ella-changed-files.txt" git add --

          git commit -m "Ella Mizuki: apply requested fix"
          git push origin "HEAD:${HEAD_REF}"

          COMMIT_SHA="$(git rev-parse --short HEAD)"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Comment fix success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'fix' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMIT_SHA: ${{ steps.commit_fix.outputs.commit_sha }}
        run: |
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "Fix aplicado e commitado.

          Commit: \`${COMMIT_SHA}\`

          ${SUMMARY}"

      - name: React fix success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'fix' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="rocket" \
            >/dev/null || true

      - name: Commit solve branch as Yuri
        id: commit_solve
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e

          echo "::add-mask::$YURI_COMMIT_NAME"
          echo "::add-mask::$YURI_COMMIT_EMAIL"

          if [ -z "$YURI_COMMIT_NAME" ]; then
            echo "Missing secret: YURI_COMMIT_NAME"
            exit 1
          fi

          if [ -z "$YURI_COMMIT_EMAIL" ]; then
            echo "Missing secret: YURI_COMMIT_EMAIL"
            exit 1
          fi

          git config user.name "$YURI_COMMIT_NAME"
          git config user.email "$YURI_COMMIT_EMAIL"

          git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"
          xargs -a "$RUNNER_TEMP/ella-changed-files.txt" git add --

          git commit -m "Ella Mizuki: solve issue #${{ github.event.issue.number }}"
          git push origin "HEAD:${BRANCH_NAME}"

          COMMIT_SHA="$(git rev-parse --short HEAD)"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Create pull request for issue
        id: solve_pr
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASE_REF: ${{ steps.issue.outputs.base_ref }}
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e

          ISSUE_TITLE="$(jq -r '.title' "$RUNNER_TEMP/issue-info.json")"
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          PR_URL="$(gh pr create \
            --repo "$REPO" \
            --base "$BASE_REF" \
            --head "$BRANCH_NAME" \
            --title "Fix issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}

          ${SUMMARY}")"

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment solve success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.solve_pr.outputs.pr_url }}
          COMMIT_SHA: ${{ steps.commit_solve.outputs.commit_sha }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Criei um PR para resolver esta issue.

          PR: ${PR_URL}
          Commit: \`${COMMIT_SHA}\`"

      - name: React solve success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="rocket" \
            >/dev/null || true