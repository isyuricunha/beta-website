                  echo ""
                  echo "----- END REQUESTED FILE: $file -----"
                } >> "$RUNNER_TEMP/ella-extra-context.txt"
              else
                {
                  echo ""
                  echo "----- REQUESTED FILE MISSING: $file -----"
                } >> "$RUNNER_TEMP/ella-extra-context.txt"
              fi
            done < "$RUNNER_TEMP/ella-needed-files.txt"
          }

          run_project_checks() {
            {
              echo "Checks executados:"
              echo ""
              cat "$RUNNER_TEMP/ella-install-summary.md"
            } > "$RUNNER_TEMP/ella-checks-summary.md"

            FAILED=0

            if [ -f package.json ]; then
              PACKAGE_RUNNER="$(cat "$RUNNER_TEMP/ella-package-runner.txt" 2>/dev/null || echo "npm run")"

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.lint ? 0 : 1)"; then
                run_check "lint" $PACKAGE_RUNNER lint || FAILED=1
              else
                echo "- ⚪ lint: script não encontrado" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)"; then
                run_check "test" $PACKAGE_RUNNER test || FAILED=1
              else
                echo "- ⚪ test: script não encontrado" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.build ? 0 : 1)"; then
                run_check "build" $PACKAGE_RUNNER build || FAILED=1
              else
                echo "- ⚪ build: script não encontrado" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi
            else
              echo "- ⚪ package.json não encontrado, sem checks automáticos" >> "$RUNNER_TEMP/ella-checks-summary.md"
            fi

            return "$FAILED"
          }

          if ! prepare_install_once; then
            {
              echo "Failure type: install_failed"
              echo ""
              echo "Install failed before Ella could safely edit."
              echo ""
              cat "$RUNNER_TEMP/ella-install-summary.md"
            } > "$RUNNER_TEMP/ella-final-summary.md"

            update_progress "❌ Ella Mizuki parou antes de editar.

          Motivo: install falhou.
          Artifact de debug será gerado se disponível."

            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while [ "$ATTEMPT" -le "$ELLA_MAX_ATTEMPTS" ]; do
            NOW_TS="$(date +%s)"
            ELAPSED=$((NOW_TS - START_TS))

            if [ "$ELAPSED" -ge "$ELLA_TIME_LIMIT_SECONDS" ]; then
              {
                echo "Failure type: time_limit"
                echo ""
                echo "Tempo limite atingido antes de passar nos checks."
                echo ""
                echo "Tentativas usadas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}"
                echo "Tempo usado: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"
                echo ""
                echo "Último feedback:"
                cat "$RUNNER_TEMP/ella-feedback.txt"
              } > "$RUNNER_TEMP/ella-final-summary.md"

              update_progress "⏱️ Ella Mizuki atingiu o limite de tempo.

          Tentativas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}
          Tempo usado: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"

              break
            fi

            echo "Ella attempt ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}"

            update_progress "👀 Ella Mizuki está trabalhando.

          Status: tentativa ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Etapa: preparando contexto e chamando IA.
          Tempo usado: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"

            build_context

            if ! call_ai; then
              update_progress "⚠️ Ella Mizuki encontrou erro ao chamar a IA.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: tentar novamente, se houver tempo."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            set +e
            apply_ai_response
            APPLY_STATUS=$?
            set -e

            if [ "$APPLY_STATUS" = "20" ]; then
              append_needed_files_context || true
              {
                echo "Failure type: needs_more_files"
                echo ""
                echo "A tentativa ${ATTEMPT} pediu mais arquivos. Forneci os arquivos válidos solicitados."
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "📖 Ella Mizuki pediu mais contexto.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Status: forneci arquivos extras permitidos."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            if [ "$APPLY_STATUS" != "0" ]; then
              {
                echo "A tentativa ${ATTEMPT} retornou JSON inválido ou não aplicável."
                echo ""
                cat "$RUNNER_TEMP/ella-apply-error.txt"
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ Ella Mizuki recebeu uma resposta não aplicável da IA.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: pedir correção do formato/arquivo."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            set +e
            git diff --check > "$RUNNER_TEMP/ella-diff-check.txt" 2>&1
            DIFF_CHECK_STATUS=$?
            set -e

            if [ "$DIFF_CHECK_STATUS" != "0" ]; then
              {
                echo "Failure type: diff_check_failed"
                echo ""
                echo "A tentativa ${ATTEMPT} falhou em git diff --check."
                echo ""
                cat "$RUNNER_TEMP/ella-diff-check.txt"
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ Ella Mizuki aplicou mudanças, mas elas falharam em git diff --check.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: corrigir formatação/whitespace."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"

            if [ ! -s "$RUNNER_TEMP/ella-changed-files.txt" ]; then
              {
                echo "Failure type: no_changes"
                echo ""
                echo "A tentativa ${ATTEMPT} não gerou mudanças reais nos arquivos."
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ Ella Mizuki não gerou mudanças reais.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: tentar novamente com feedback mais direto."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            update_progress "🧪 Ella Mizuki aplicou mudanças e está rodando checks.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Etapa: lint/test/build."

            set +e
            run_project_checks
            CHECK_STATUS=$?
            set -e

            if [ "$CHECK_STATUS" = "0" ]; then
              SUCCESS="true"

              {
                echo "Ella Mizuki conseguiu aplicar o fix."
                echo ""
                echo "Tentativas usadas: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}"
                echo ""
                echo "Resumo da IA:"
                cat "$RUNNER_TEMP/ella-fix-summary.txt"
                echo ""
                cat "$RUNNER_TEMP/ella-checks-summary.md"
              } > "$RUNNER_TEMP/ella-final-summary.md"

              update_progress "✅ Ella Mizuki passou nos checks.

          Tentativas usadas: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: commit/PR."

              break
            fi

            {
              echo "Failure type: project_checks_failed"
              echo ""
              echo "A tentativa ${ATTEMPT} aplicou mudanças, mas os checks falharam."
              echo ""
              cat "$RUNNER_TEMP/ella-checks-summary.md"
              echo ""
              echo "Corrija apenas os erros acima, preservando o comportamento atual."
            } > "$RUNNER_TEMP/ella-feedback.txt"

            update_progress "🔁 Ella Mizuki aplicou mudanças, mas os checks falharam.

          Tentativa: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Próximo passo: corrigir os erros dos checks e tentar novamente."

            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$SUCCESS" != "true" ]; then
            if [ ! -s "$RUNNER_TEMP/ella-final-summary.md" ]; then
              {
                echo "Failure type: max_attempts"
                echo ""
                echo "Ella Mizuki não conseguiu chegar em um fix válido dentro dos limites."
                echo ""
                echo "Tentativas usadas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}"
                echo ""
                echo "Último feedback:"
                cat "$RUNNER_TEMP/ella-feedback.txt"
              } > "$RUNNER_TEMP/ella-final-summary.md"
            fi

            update_progress "❌ Ella Mizuki não conseguiu passar nos checks dentro dos limites.

          Tentativas usadas: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}
          Status: parei sem commit."

            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Upload Ella debug artifacts
        if: >
          ${{
            always() &&
            (
              (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue')) ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        uses: actions/upload-artifact@v4
        with:
          name: ella-mizuki-debug-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/ella-context.txt
            ${{ runner.temp }}/ella-feedback.txt
            ${{ runner.temp }}/ella-final-summary.md
            ${{ runner.temp }}/ella-repo-instructions.txt
            ${{ runner.temp }}/ella-extra-context.txt
            ${{ runner.temp }}/ella-allowed-files.txt
            ${{ runner.temp }}/ella-repo-files-limited.txt
            ${{ runner.temp }}/pr-info.json
            ${{ runner.temp }}/issue-info.json
            ${{ runner.temp }}/pr-diff-limited.txt
            ${{ runner.temp }}/response.stream
            ${{ runner.temp }}/ai-response.txt
            ${{ runner.temp }}/ella-fix-summary.txt
            ${{ runner.temp }}/ella-apply-error.txt
            ${{ runner.temp }}/ella-needed-files.txt
            ${{ runner.temp }}/ella-changed-files.txt
            ${{ runner.temp }}/ella-checks-summary.md
            ${{ runner.temp }}/ella-check-*.log
            ${{ runner.temp }}/ella-install.log
            ${{ runner.temp }}/ella-install-summary.md
            ${{ runner.temp }}/ella-labels.txt
            ${{ runner.temp }}/ella-label-summary.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment loop failure
        if: >
          ${{
            steps.ella_loop.outputs.success == 'false' &&
            (
              (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue')) ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Tentei resolver em loop, mas não consegui passar nos checks dentro dos limites.

          ${SUMMARY}"

      - name: React loop failure
        if: >
          ${{
            steps.ella_loop.outputs.success == 'false' &&
            (
              (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue')) ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="confused" \
            >/dev/null || true

      - name: Commit and push fix as Yuri
        id: commit_fix
        if: ${{ steps.ella_loop.outputs.success == 'true' && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') }}
        env:
          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -e

          echo "::add-mask::$YURI_COMMIT_NAME"
          echo "::add-mask::$YURI_COMMIT_EMAIL"

          if [ -z "$YURI_COMMIT_NAME" ]; then
            echo "Missing secret: YURI_COMMIT_NAME"
            exit 1
          fi

          if [ -z "$YURI_COMMIT_EMAIL" ]; then
            echo "Missing secret: YURI_COMMIT_EMAIL"
            exit 1
          fi

          git config user.name "$YURI_COMMIT_NAME"
          git config user.email "$YURI_COMMIT_EMAIL"

          git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"
          xargs -a "$RUNNER_TEMP/ella-changed-files.txt" git add --

          git commit -m "Apply requested fix"
          git push origin "HEAD:${HEAD_REF}"

          COMMIT_SHA="$(git rev-parse --short HEAD)"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Comment fix success
        if: ${{ steps.ella_loop.outputs.success == 'true' && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMIT_SHA: ${{ steps.commit_fix.outputs.commit_sha }}
        run: |
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "Fix aplicado e commitado.

          Commit: \`${COMMIT_SHA}\`

          ${SUMMARY}"

      - name: React fix success
        if: ${{ steps.ella_loop.outputs.success == 'true' && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="rocket" \
            >/dev/null || true

      - name: Commit solve branch as Yuri
        id: commit_solve
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e

          echo "::add-mask::$YURI_COMMIT_NAME"
          echo "::add-mask::$YURI_COMMIT_EMAIL"

          if [ -z "$YURI_COMMIT_NAME" ]; then
            echo "Missing secret: YURI_COMMIT_NAME"
            exit 1
          fi

          if [ -z "$YURI_COMMIT_EMAIL" ]; then
            echo "Missing secret: YURI_COMMIT_EMAIL"
            exit 1
          fi

          git config user.name "$YURI_COMMIT_NAME"
          git config user.email "$YURI_COMMIT_EMAIL"

          git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"
          xargs -a "$RUNNER_TEMP/ella-changed-files.txt" git add --

          git commit -m "Solve issue #${{ github.event.issue.number }}"
          git push origin "HEAD:${BRANCH_NAME}"

          COMMIT_SHA="$(git rev-parse --short HEAD)"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Create pull request for issue
        id: solve_pr
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASE_REF: ${{ steps.issue.outputs.base_ref }}
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e

          ISSUE_TITLE="$(jq -r '.title' "$RUNNER_TEMP/issue-info.json")"
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          PR_URL="$(gh pr create \
            --repo "$REPO" \
            --base "$BASE_REF" \
            --head "$BRANCH_NAME" \
            --title "Fix issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}

          ${SUMMARY}")"

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment solve success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.solve_pr.outputs.pr_url }}
          COMMIT_SHA: ${{ steps.commit_solve.outputs.commit_sha }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Criei um PR para resolver esta issue.

          PR: ${PR_URL}
          Commit: \`${COMMIT_SHA}\`"

      - name: React solve success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="rocket" \
            >/dev/null || true