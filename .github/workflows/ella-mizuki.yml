              echo "Checks executed:"
              echo ""
              cat "$RUNNER_TEMP/ella-install-summary.md"
            } > "$RUNNER_TEMP/ella-checks-summary.md"

            FAILED=0

            if [ -f package.json ]; then
              PACKAGE_RUNNER="$(cat "$RUNNER_TEMP/ella-package-runner.txt" 2>/dev/null || echo "npm run")"

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.lint ? 0 : 1)"; then
                run_check "lint" $PACKAGE_RUNNER lint || FAILED=1
              else
                echo "- ⚪ lint: script not found" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)"; then
                run_check "test" $PACKAGE_RUNNER test || FAILED=1
              else
                echo "- ⚪ test: script not found" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi

              if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.build ? 0 : 1)"; then
                run_check "build" $PACKAGE_RUNNER build || FAILED=1
              else
                echo "- ⚪ build: script not found" >> "$RUNNER_TEMP/ella-checks-summary.md"
              fi
            else
              echo "- ⚪ package.json not found, no automatic checks" >> "$RUNNER_TEMP/ella-checks-summary.md"
            fi

            return "$FAILED"
          }

          if ! prepare_install_once; then
            {
              echo "Failure type: install_failed"
              echo ""
              echo "Install failed before I could safely edit."
              echo ""
              cat "$RUNNER_TEMP/ella-install-summary.md"
            } > "$RUNNER_TEMP/ella-final-summary.md"

            update_progress "❌ I stopped before editing.

          Reason: install failed.
          A debug artifact will be uploaded if available."

            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while [ "$ATTEMPT" -le "$ELLA_MAX_ATTEMPTS" ]; do
            NOW_TS="$(date +%s)"
            ELAPSED=$((NOW_TS - START_TS))

            if [ "$ELAPSED" -ge "$ELLA_TIME_LIMIT_SECONDS" ]; then
              {
                echo "Failure type: time_limit"
                echo ""
                echo "Time limit reached before checks passed."
                echo ""
                echo "Attempts used: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}"
                echo "Time used: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"
                echo ""
                echo "Last feedback:"
                cat "$RUNNER_TEMP/ella-feedback.txt"
              } > "$RUNNER_TEMP/ella-final-summary.md"

              update_progress "⏱️ I reached the time limit.

          Attempts: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}
          Time used: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"

              break
            fi

            echo "Attempt ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}"

            update_progress "👀 I am working on it.

          Status: attempt ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Step: preparing context and calling the model.
          Time used: ${ELAPSED}s/${ELLA_TIME_LIMIT_SECONDS}s"

            build_context

            if ! call_ai; then
              update_progress "⚠️ I hit an error while calling the model.

          Attempt: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Next step: retry if there is enough time."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            set +e
            apply_ai_response
            APPLY_STATUS=$?
            set -e

            if [ "$APPLY_STATUS" = "20" ]; then
              append_needed_files_context || true
              {
                echo "Failure type: needs_more_files"
                echo ""
                echo "Attempt ${ATTEMPT} requested more files. I provided the valid requested files."
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "📖 I need more context.

          Attempt: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Status: I provided the extra allowed files."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            if [ "$APPLY_STATUS" != "0" ]; then
              {
                echo "Attempt ${ATTEMPT} returned invalid or non-applicable JSON."
                echo ""
                cat "$RUNNER_TEMP/ella-apply-error.txt"
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ The model returned a response I could not apply.

          Attempt: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Next step: ask for a corrected format or allowed file."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            set +e
            git diff --check > "$RUNNER_TEMP/ella-diff-check.txt" 2>&1
            DIFF_CHECK_STATUS=$?
            set -e

            if [ "$DIFF_CHECK_STATUS" != "0" ]; then
              {
                echo "Failure type: diff_check_failed"
                echo ""
                echo "Attempt ${ATTEMPT} failed git diff --check."
                echo ""
                cat "$RUNNER_TEMP/ella-diff-check.txt"
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ I applied changes, but they failed git diff --check.

          Attempt: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Next step: fix formatting or whitespace."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"

            if [ ! -s "$RUNNER_TEMP/ella-changed-files.txt" ]; then
              {
                echo "Failure type: no_changes"
                echo ""
                echo "Attempt ${ATTEMPT} did not produce real file changes."
              } > "$RUNNER_TEMP/ella-feedback.txt"

              update_progress "⚠️ I did not produce any real file changes.

          Attempt: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Next step: retry with clearer feedback."

              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            update_progress "🧪 I applied changes and I am running checks.

          Attempt: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Step: lint/test/build."

            set +e
            run_project_checks
            CHECK_STATUS=$?
            set -e

            if [ "$CHECK_STATUS" = "0" ]; then
              SUCCESS="true"

              {
                echo "I applied the fix successfully."
                echo ""
                echo "Attempts used: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}"
                echo ""
                echo "Summary:"
                cat "$RUNNER_TEMP/ella-fix-summary.txt"
                echo ""
                cat "$RUNNER_TEMP/ella-checks-summary.md"
              } > "$RUNNER_TEMP/ella-final-summary.md"

              update_progress "✅ Checks passed.

          Attempts used: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Next step: commit/PR."

              break
            fi

            {
              echo "Failure type: project_checks_failed"
              echo ""
              echo "Attempt ${ATTEMPT} applied changes, but checks failed."
              echo ""
              cat "$RUNNER_TEMP/ella-checks-summary.md"
              echo ""
              echo "Fix only the errors above while preserving the current behavior."
            } > "$RUNNER_TEMP/ella-feedback.txt"

            update_progress "🔁 I applied changes, but checks failed.

          Attempt: ${ATTEMPT}/${ELLA_MAX_ATTEMPTS}
          Next step: fix the check errors and try again."

            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$SUCCESS" != "true" ]; then
            if [ ! -s "$RUNNER_TEMP/ella-final-summary.md" ]; then
              {
                echo "Failure type: max_attempts"
                echo ""
                echo "I could not reach a valid fix within the limits."
                echo ""
                echo "Attempts used: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}"
                echo ""
                echo "Last feedback:"
                cat "$RUNNER_TEMP/ella-feedback.txt"
              } > "$RUNNER_TEMP/ella-final-summary.md"
            fi

            update_progress "❌ I could not get the checks to pass within the limits.

          Attempts used: $((ATTEMPT - 1))/${ELLA_MAX_ATTEMPTS}
          Status: stopped without committing."

            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Upload debug artifacts
        if: >
          ${{
            always() &&
            (
              (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue')) ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        uses: actions/upload-artifact@v4
        with:
          name: ella-mizuki-debug-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/ella-context.txt
            ${{ runner.temp }}/ella-feedback.txt
            ${{ runner.temp }}/ella-final-summary.md
            ${{ runner.temp }}/ella-repo-instructions.txt
            ${{ runner.temp }}/ella-extra-context.txt
            ${{ runner.temp }}/ella-allowed-files.txt
            ${{ runner.temp }}/ella-repo-files-limited.txt
            ${{ runner.temp }}/pr-info.json
            ${{ runner.temp }}/issue-info.json
            ${{ runner.temp }}/pr-diff-limited.txt
            ${{ runner.temp }}/response.stream
            ${{ runner.temp }}/ai-response.txt
            ${{ runner.temp }}/ella-fix-summary.txt
            ${{ runner.temp }}/ella-apply-error.txt
            ${{ runner.temp }}/ella-needed-files.txt
            ${{ runner.temp }}/ella-changed-files.txt
            ${{ runner.temp }}/ella-checks-summary.md
            ${{ runner.temp }}/ella-check-*.log
            ${{ runner.temp }}/ella-install.log
            ${{ runner.temp }}/ella-install-summary.md
            ${{ runner.temp }}/ella-labels.txt
            ${{ runner.temp }}/ella-label-summary.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment loop failure
        if: >
          ${{
            steps.ella_loop.outputs.success == 'false' &&
            (
              (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue')) ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "I tried to solve this in a loop, but I could not get the checks to pass within the limits.

          ${SUMMARY}"

      - name: React loop failure
        if: >
          ${{
            steps.ella_loop.outputs.success == 'false' &&
            (
              (github.event.issue.pull_request && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue')) ||
              (!github.event.issue.pull_request && steps.parse.outputs.mode == 'solve')
            )
          }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="confused" \
            >/dev/null || true

      - name: Commit and push fix as Yuri
        id: commit_fix
        if: ${{ steps.ella_loop.outputs.success == 'true' && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') }}
        env:
          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -e

          echo "::add-mask::$YURI_COMMIT_NAME"
          echo "::add-mask::$YURI_COMMIT_EMAIL"

          if [ -z "$YURI_COMMIT_NAME" ]; then
            echo "Missing secret: YURI_COMMIT_NAME"
            exit 1
          fi

          if [ -z "$YURI_COMMIT_EMAIL" ]; then
            echo "Missing secret: YURI_COMMIT_EMAIL"
            exit 1
          fi

          git config user.name "$YURI_COMMIT_NAME"
          git config user.email "$YURI_COMMIT_EMAIL"

          git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"
          xargs -a "$RUNNER_TEMP/ella-changed-files.txt" git add --

          git commit -m "Apply requested fix"
          git push origin "HEAD:${HEAD_REF}"

          COMMIT_SHA="$(git rev-parse --short HEAD)"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Comment fix success
        if: ${{ steps.ella_loop.outputs.success == 'true' && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMIT_SHA: ${{ steps.commit_fix.outputs.commit_sha }}
        run: |
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "I applied the fix and committed it.

          Commit: \`${COMMIT_SHA}\`

          ${SUMMARY}"

      - name: React fix success
        if: ${{ steps.ella_loop.outputs.success == 'true' && (steps.parse.outputs.mode == 'fix' || steps.parse.outputs.mode == 'continue') }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="rocket" \
            >/dev/null || true

      - name: Commit solve branch as Yuri
        id: commit_solve
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          YURI_COMMIT_NAME: ${{ secrets.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ secrets.YURI_COMMIT_EMAIL }}
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e

          echo "::add-mask::$YURI_COMMIT_NAME"
          echo "::add-mask::$YURI_COMMIT_EMAIL"

          if [ -z "$YURI_COMMIT_NAME" ]; then
            echo "Missing secret: YURI_COMMIT_NAME"
            exit 1
          fi

          if [ -z "$YURI_COMMIT_EMAIL" ]; then
            echo "Missing secret: YURI_COMMIT_EMAIL"
            exit 1
          fi

          git config user.name "$YURI_COMMIT_NAME"
          git config user.email "$YURI_COMMIT_EMAIL"

          git ls-files --modified --others --exclude-standard > "$RUNNER_TEMP/ella-changed-files.txt"
          xargs -a "$RUNNER_TEMP/ella-changed-files.txt" git add --

          git commit -m "Solve issue #${{ github.event.issue.number }}"
          git push origin "HEAD:${BRANCH_NAME}"

          COMMIT_SHA="$(git rev-parse --short HEAD)"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Create pull request for issue
        id: solve_pr
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASE_REF: ${{ steps.issue.outputs.base_ref }}
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
        run: |
          set -e

          ISSUE_TITLE="$(jq -r '.title' "$RUNNER_TEMP/issue-info.json")"
          SUMMARY="$(cat "$RUNNER_TEMP/ella-final-summary.md")"

          PR_URL="$(gh pr create \
            --repo "$REPO" \
            --base "$BASE_REF" \
            --head "$BRANCH_NAME" \
            --title "Fix issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}

          ${SUMMARY}")"

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment solve success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.solve_pr.outputs.pr_url }}
          COMMIT_SHA: ${{ steps.commit_solve.outputs.commit_sha }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "I created a PR for this issue.

          PR: ${PR_URL}
          Commit: \`${COMMIT_SHA}\`"

      - name: React solve success
        if: ${{ steps.ella_loop.outputs.success == 'true' && steps.parse.outputs.mode == 'solve' }}
        env:
          GH_TOKEN: ${{ steps.ella_token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -H "Accept: application/vnd.github+json" \
            -f content="rocket" \
            >/dev/null || true