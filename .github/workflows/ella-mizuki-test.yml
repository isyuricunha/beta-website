name: Ella Mizuki Test

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  test-ella-comment:
    if: >
      contains(github.event.comment.body, '/ella test') &&
      github.event.comment.user.login == 'isyuricunha'
    runs-on: ubuntu-latest

    steps:
      - name: Create Ella Mizuki token
        id: ella-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.YUE_APP_CLIENT_ID }}
          private-key: ${{ secrets.YUE_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write

      - name: Comment as Ella Mizuki
        env:
          GH_TOKEN: ${{ steps.ella-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Oi, eu sou a Ella Mizuki. Token funcionando."

  test-yuri-commit:
    if: >
      contains(github.event.comment.body, '/ella commit-test') &&
      github.event.comment.user.login == 'isyuricunha'
    runs-on: ubuntu-latest

    steps:
      - name: Create Ella Mizuki token
        id: ella-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.YUE_APP_CLIENT_ID }}
          private-key: ${{ secrets.YUE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ella-token.outputs.token }}
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure commit author as Yuri
        env:
          YURI_COMMIT_NAME: ${{ vars.YURI_COMMIT_NAME }}
          YURI_COMMIT_EMAIL: ${{ vars.YURI_COMMIT_EMAIL }}
        run: |
          if [ -z "$YURI_COMMIT_NAME" ]; then
            echo "Missing variable: YURI_COMMIT_NAME"
            exit 1
          fi

          if [ -z "$YURI_COMMIT_EMAIL" ]; then
            echo "Missing variable: YURI_COMMIT_EMAIL"
            exit 1
          fi

          git config user.name "$YURI_COMMIT_NAME"
          git config user.email "$YURI_COMMIT_EMAIL"

      - name: Create test commit
        run: |
          mkdir -p .github

          {
            echo "Ella Mizuki commit test"
            echo "Updated at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "Triggered by: ${{ github.event.comment.user.login }}"
          } > .github/ella-mizuki-commit-test.txt

          git add .github/ella-mizuki-commit-test.txt
          git commit -m "Test Ella Mizuki commit author"
          git push

      - name: Comment result as Ella Mizuki
        env:
          GH_TOKEN: ${{ steps.ella-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          YURI_COMMIT_NAME: ${{ vars.YURI_COMMIT_NAME }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Commit de teste criado. O autor do commit deve aparecer como ${YURI_COMMIT_NAME}, e este comentário deve aparecer como Ella Mizuki."

  test-ella-ai:
    if: >
      contains(github.event.comment.body, '/ella ai-test') &&
      github.event.comment.user.login == 'isyuricunha'
    runs-on: ubuntu-latest

    steps:
      - name: Create Ella Mizuki token
        id: ella-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.YUE_APP_CLIENT_ID }}
          private-key: ${{ secrets.YUE_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write

      - name: Comment start as Ella Mizuki
        env:
          GH_TOKEN: ${{ steps.ella-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Comecei o teste da IA agora. Vou validar as configs e tentar chamar o endpoint."

      - name: Validate AI config
        env:
          ELLA_AI_BASE_URL: ${{ vars.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ vars.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
        run: |
          set -e

          echo "Checking AI config..."

          if [ -z "$ELLA_AI_BASE_URL" ]; then
            echo "Missing variable: ELLA_AI_BASE_URL"
            exit 1
          fi

          if [ -z "$ELLA_AI_MODEL" ]; then
            echo "Missing variable: ELLA_AI_MODEL"
            exit 1
          fi

          if [ -z "$ELLA_AI_API_KEY" ]; then
            echo "Missing secret: ELLA_AI_API_KEY"
            exit 1
          fi

          echo "ELLA_AI_BASE_URL is set"
          echo "ELLA_AI_MODEL is set to: $ELLA_AI_MODEL"
          echo "ELLA_AI_API_KEY is set"

      - name: Test AI endpoint
        env:
          ELLA_AI_BASE_URL: ${{ vars.ELLA_AI_BASE_URL }}
          ELLA_AI_MODEL: ${{ vars.ELLA_AI_MODEL }}
          ELLA_AI_API_KEY: ${{ secrets.ELLA_AI_API_KEY }}
        run: |
          set -e

          REQUEST_BODY="$(jq -n \
            --arg model "$ELLA_AI_MODEL" \
            --arg system "You are Ella Mizuki, Yuri's GitHub repository assistant. Keep answers short." \
            --arg user "Reply in Brazilian Portuguese with one short sentence saying the AI endpoint is working." \
            '{
              model: $model,
              messages: [
                { role: "system", content: $system },
                { role: "user", content: $user }
              ],
              temperature: 0.2
            }')"

          TARGET_URL="${ELLA_AI_BASE_URL%/}/chat/completions"

          echo "Calling AI endpoint..."
          echo "Target path: /chat/completions"
          echo "Model: $ELLA_AI_MODEL"

          HTTP_STATUS="$(curl -sS \
            -o response.json \
            -w "%{http_code}" \
            -X POST "$TARGET_URL" \
            -H "Authorization: Bearer ${ELLA_AI_API_KEY}" \
            -H "Content-Type: application/json" \
            --data "$REQUEST_BODY")"

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "AI endpoint failed"
            cat response.json
            exit 1
          fi

          AI_RESPONSE="$(jq -r '.choices[0].message.content // empty' response.json)"

          if [ -z "$AI_RESPONSE" ]; then
            echo "Could not read AI response"
            cat response.json
            exit 1
          fi

          echo "$AI_RESPONSE" > ai-response.txt

      - name: Comment AI response as Ella Mizuki
        env:
          GH_TOKEN: ${{ steps.ella-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          AI_RESPONSE="$(cat ai-response.txt)"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "Ella Mizuki AI test:

          ${AI_RESPONSE}"
